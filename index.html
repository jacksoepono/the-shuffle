<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050505">
<title>The Shuffle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--surface:#0e0e0e;--surface2:#161616;--border:#1e1e1e;--text:#f0ede6;--text2:#8a8680;--text3:#4a4744;--accent:#ff4d00;--accent2:#ff7a3d;--accent-glow:#ff4d0033;--green:#1DB954;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh;position:absolute;inset:0}
.screen.active{display:flex}
#screen-home{align-items:center;justify-content:center;padding:40px 28px;text-align:center;background:radial-gradient(ellipse at 50% 80%,#ff4d0008 0%,transparent 60%),var(--bg)}
#screen-home h1{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,#ff4d00,#ff9a5c,#ff4d00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.tagline{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--text3);margin-bottom:44px}
.desc{font-size:15px;line-height:1.6;color:var(--text2);max-width:320px;margin-bottom:48px}
.btn-primary{width:100%;max-width:320px;padding:16px 24px;background:linear-gradient(135deg,var(--accent),#cc3d00);border:none;border-radius:var(--radius);color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 24px var(--accent-glow)}
.btn-primary:active{transform:scale(0.97)}.btn-primary:disabled{opacity:0.4}
.btn-secondary{width:100%;max-width:320px;padding:16px 24px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;cursor:pointer}
.btn-spotify{width:100%;max-width:320px;padding:16px 24px;background:var(--green);border:none;border-radius:var(--radius);color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 24px #1DB95433}
.btn-small{padding:10px 20px;background:var(--surface2);border:none;border-radius:10px;color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.btn-start{width:100%;max-width:320px;padding:18px 24px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 0 20px var(--accent-glow),0 0 60px #ff4d0022;animation:glowRadiate 2s ease-in-out infinite}
.btn-start:active{transform:scale(0.97)}
@keyframes glowRadiate{0%,100%{box-shadow:0 0 20px var(--accent-glow),0 0 40px #ff4d0015}50%{box-shadow:0 0 30px #ff4d0055,0 0 80px #ff4d0025}}
#screen-lobby{padding:24px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#screen-lobby::-webkit-scrollbar{display:none}
.lobby-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.back-btn{background:none;border:none;color:var(--text3);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;padding:8px 0}
.countdown-name-btn{background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lobby-title{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;margin-bottom:4px}
.lobby-subtitle{font-size:14px;color:var(--text3);margin-bottom:20px}
.songs-config{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:14px 16px;background:var(--surface);border-radius:12px}
.songs-config label{font-size:14px;color:var(--text2);flex:1}
.songs-config select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-family:'Outfit',sans-serif;font-size:14px;-webkit-appearance:none}
.player-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.player-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}
.player-card.submitted{border-color:#1DB95444}
.player-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.player-info{flex:1}.player-name{font-weight:600;font-size:15px}
.player-status{font-size:12px;color:var(--text3);margin-top:2px}.player-status.done{color:var(--green)}
.add-player-row{display:flex;gap:8px;margin-bottom:20px}
.add-player-row input{flex:1;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px}
.add-player-row input:focus{outline:none;border-color:var(--accent)}
.add-player-row input::placeholder{color:var(--text3)}
.remove-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 8px}
#screen-pick{padding:0}
.pick-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.pick-count{display:flex;align-items:center;gap:10px;padding:0 20px;margin-bottom:16px}
.pick-count .big-num{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:800;color:var(--accent)}
.pick-count .label{font-size:13px;color:var(--text3);line-height:1.3}
.search-wrap{padding:0 20px;margin-bottom:12px;position:relative}
.search-wrap input{width:100%;padding:14px 18px 14px 44px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px}
.search-wrap input:focus{outline:none;border-color:var(--text3)}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:34px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;display:flex}
.selected-strip{display:flex;gap:6px;padding:0 20px;margin-bottom:12px;overflow-x:auto}
.selected-strip::-webkit-scrollbar{display:none}
.selected-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:#ff4d0015;border:1px solid #ff4d0033;border-radius:20px;padding:4px 12px 4px 4px;font-size:12px;color:var(--accent2);cursor:pointer}
.selected-chip img{width:24px;height:24px;border-radius:50%;object-fit:cover}
.song-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 100px}
.song-list::-webkit-scrollbar{display:none}
.song-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent}
.song-item:active{background:var(--surface)}
.song-item.selected{background:#ff4d000a;border-color:#ff4d0022}
.song-item.disabled{opacity:0.3;pointer-events:none}
.song-art{width:48px;height:48px;border-radius:6px;background:var(--surface2);flex-shrink:0;overflow:hidden}
.song-art img{width:100%;height:100%;object-fit:cover}
.song-meta{flex:1;min-width:0}
.song-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist{font-size:12px;color:var(--text2);margin-top:2px}
.song-check{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.pick-footer{position:fixed;bottom:0;left:0;right:0;padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 30%)}
.pick-footer .btn-primary{max-width:100%}
#screen-countdown{align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch}
#screen-countdown::-webkit-scrollbar{display:none}
.countdown-topbar{position:fixed;top:0;left:0;right:0;padding:20px;display:flex;justify-content:space-between;align-items:center;z-index:10;background:linear-gradient(var(--bg),transparent)}
.countdown-topbar .brand{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;color:var(--text3)}
.countdown-center{text-align:center;width:100%}
.announce-number{font-family:'JetBrains Mono',monospace;font-size:120px;font-weight:800;line-height:1;background:linear-gradient(180deg,#fff 20%,#666);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:numberPop 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.now-playing{text-align:center;animation:slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.np-position{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:800;letter-spacing:-0.02em;color:var(--accent);margin-bottom:16px}
.np-art{width:200px;height:200px;border-radius:12px;margin:0 auto 24px;overflow:hidden;box-shadow:0 8px 40px #00000066}
.np-art img{width:100%;height:100%;object-fit:cover}
.np-title{font-size:24px;font-weight:700;margin-bottom:6px}
.np-artist{font-size:16px;color:var(--text2);margin-bottom:16px}
.np-submitter{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:13px;color:var(--text2)}
.avatar-sm{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.playback-controls{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:28px}
.ctrl-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center}
.ctrl-btn:active{color:var(--text)}
.ctrl-btn svg{width:28px;height:28px;fill:currentColor}
.ctrl-btn.play{width:60px;height:60px;border-radius:50%;background:var(--text);color:var(--bg);padding:0;box-shadow:0 4px 20px #ffffff22}
.ctrl-btn.play svg{width:24px;height:24px}
.progress-wrap{width:100%;max-width:300px;margin:24px auto 0}
.progress-bar{width:100%;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width 1s linear}
.progress-times{display:flex;justify-content:space-between;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.countdown-progress{width:100%;max-width:280px;margin:0 auto 24px}
.countdown-progress .track{width:100%;height:3px;background:var(--surface);border-radius:2px;overflow:hidden;margin-bottom:8px}
.countdown-progress .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.5s ease}
.countdown-progress .label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);text-align:center}
.big-play{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#cc3d00);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 30px var(--accent-glow);margin:0 auto}
.big-play:active{transform:scale(0.93)}
.big-play svg{width:36px;height:36px;fill:#fff}
.reveal-hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-top:16px;letter-spacing:0.1em;text-align:center}
.revealed-ticker{position:fixed;bottom:0;left:16px;right:16px;display:flex;gap:8px;overflow-x:auto;padding:12px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:5}
.revealed-ticker::-webkit-scrollbar{display:none}
.ticker-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px}
.ticker-chip .pos{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.ticker-chip .name{font-size:11px;color:var(--text2);max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-overlay{position:fixed;inset:0;background:#000000aa;z-index:99;display:none}
.history-overlay.open{display:block;animation:fadeIn 0.2s ease-out}
.history-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);border-radius:20px 20px 0 0;z-index:100;max-height:75vh;display:none;flex-direction:column}
.history-panel.open{display:flex;animation:slideFromBottom 0.3s ease-out}
.history-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
.history-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 16px}
.history-header h3{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.history-close{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px 8px;display:flex}
.history-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 20px}
.history-list::-webkit-scrollbar{display:none}
.history-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1e1e1e44}
.history-pos{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text3);width:32px;text-align:right;flex-shrink:0}
.history-art{width:40px;height:40px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--surface2)}
.history-art img{width:100%;height:100%;object-fit:cover}
.history-meta{flex:1;min-width:0}
.history-song-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-song-artist{font-size:12px;color:var(--text2);margin-top:1px}
.finished-wrap{text-align:center;width:100%;animation:fadeUp 0.6s ease-out;padding-bottom:40px}
.finished-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.25em;color:var(--text3);margin-bottom:10px}
.finished-title{font-size:28px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.finished-artist{font-size:16px;color:var(--text2);margin-bottom:20px}
.finished-winner{display:inline-flex;align-items:center;gap:8px;background:#ff4d0015;border:1px solid #ff4d0033;border-radius:20px;padding:8px 20px;font-size:15px;color:var(--accent2);font-weight:600;margin-bottom:32px}
.finished-list{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;max-width:360px;margin:0 auto;text-align:left;max-height:40vh;overflow-y:auto}
.finished-list::-webkit-scrollbar{display:none}
.finished-list-header{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.15em;color:var(--text3);margin-bottom:12px}
.finished-item{display:flex;align-items:center;gap:10px;padding:7px 0}
.finished-item.winner{background:#ff4d0008;border-radius:8px;padding:7px 8px;margin:0 -8px}
.finished-pos{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);width:28px;text-align:right;flex-shrink:0}
.finished-pos.gold{color:var(--accent)}
.finished-song{flex:1;min-width:0}
.finished-song-t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.finished-song-a{font-size:11px;color:var(--text2)}
.intro-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.intro-names{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.8}
.intro-big-number{font-family:'JetBrains Mono',monospace;font-size:160px;font-weight:800;line-height:1;color:var(--accent);animation:numberPop 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.intro-text{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
.resume-history{margin-top:24px;text-align:left;max-width:320px;width:100%}
.resume-history-header{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.15em;color:var(--text3);margin-bottom:12px;text-align:center}
.rh-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e1e44}
.rh-pos{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);width:28px;text-align:right;flex-shrink:0}
.rh-art{width:36px;height:36px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--surface2)}
.rh-art img{width:100%;height:100%;object-fit:cover}
.rh-meta{flex:1;min-width:0}
.rh-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rh-artist{font-size:11px;color:var(--text2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes numberPop{0%{transform:scale(2.5) rotate(-8deg);opacity:0}60%{transform:scale(1.05) rotate(1deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideFromBottom{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="screen-home" class="screen active">
<h1>THE SHUFFLE</h1>
<p class="tagline">Your crew's hottest 100</p>
<p class="desc">Everyone picks their songs. We shuffle them into a countdown. Whoever lands #1 is the undisputed, undefeated, completely undeserving champion.</p>
<div id="home-action"><button class="btn-spotify" onclick="loginSpotify()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>Connect with Spotify</button><p style="font-size:12px;color:var(--text3);margin-top:12px;">Requires Spotify Premium</p></div>
</div>
<div id="screen-lobby" class="screen">
<div class="lobby-header"><button class="back-btn" onclick="goHome()">← Back</button><button class="countdown-name-btn" id="countdown-name-btn" onclick="editCountdownName()">Road Trip Shuffle</button></div>
<h2 class="lobby-title">The Lineup</h2><p class="lobby-subtitle" id="lobby-subtitle"></p>
<div class="songs-config"><label>Songs per person</label><select id="songs-per-user" onchange="updateSongsPerUser()"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select></div>
<div class="add-player-row"><input type="text" id="new-player-name" placeholder="Add a friend's name..." maxlength="20"><button class="btn-small" onclick="addPlayer()" style="background:var(--accent);color:#fff;">Add</button></div>
<div class="player-list" id="player-list"></div><div id="lobby-actions"></div>
</div>
<div id="screen-pick" class="screen">
<div class="pick-header"><button class="back-btn" onclick="showScreen('lobby')">← Back</button><span class="pick-user" id="pick-user"></span></div>
<div class="pick-count"><span class="big-num" id="pick-count-num">0</span><span class="label">of <span id="pick-count-total">5</span><br>selected</span><span style="flex:1"></span><button class="btn-small" id="lock-in-btn" onclick="lockInSongs()" style="display:none;background:var(--accent);color:#fff;">Lock In</button></div>
<div id="selected-strip" class="selected-strip"></div>
<div class="search-wrap"><span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span><input type="text" id="search-input" placeholder="Search Spotify..." oninput="debounceSearch()"></div>
<div class="song-list" id="song-list"></div>
<div class="pick-footer" id="pick-footer" style="display:none;"><button class="btn-primary" id="pick-footer-btn" onclick="lockInSongs()" disabled>Select more songs</button></div>
</div>
<div id="screen-countdown" class="screen">
<div class="countdown-topbar"><span class="brand" id="countdown-brand">THE SHUFFLE</span><button class="btn-small" onclick="toggleHistory()">History</button></div>
<div class="countdown-center" id="countdown-content"></div>
<div class="revealed-ticker" id="revealed-ticker"></div>
</div>
<div class="history-overlay" id="history-overlay" onclick="toggleHistory()"></div>
<div class="history-panel" id="history-panel"><div class="history-handle"></div><div class="history-header"><h3>Revealed Songs</h3><button class="history-close" onclick="toggleHistory()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div><div class="history-list" id="history-list"></div></div>
<svg style="display:none">
<symbol id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></symbol>
<symbol id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></symbol>
<symbol id="icon-skip-next" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></symbol>
<symbol id="icon-skip-prev" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></symbol>
</svg>
<script>
const CLIENT_ID='71b1b736f22c41138039a199c2fcb88b';
const REDIRECT_URI=window.location.hostname==='127.0.0.1'?`http://127.0.0.1:${window.location.port}/callback`:`${window.location.origin}/callback`;
const SCOPES='user-read-playback-state user-modify-playback-state user-read-currently-playing streaming user-read-email user-read-private';
const PLAYER_COLORS=['#E07A5F','#3D85C6','#6AA84F','#F1C232','#9B59B6','#E74C3C','#1ABC9C','#E67E22'];
const MAX_TOTAL=100;
const DEFAULT_QUERIES=['Sabrina Carpenter','Billie Eilish','Olivia Rodrigo','Harry Styles','Zach Bryan','Olivia Dean','Tyla','Chappell Roan','Hozier','Dua Lipa','Troye Sivan','Noah Kahan','SZA','Tate McRae','Benson Boone'];
let accessToken=null,spotifyUser=null,players=[],songsPerUser=5,countdownName='Road Trip Shuffle';
let currentPickerIndex=0,selectedSongs=[],submissions={};
let countdownList=[],revealedSongs=[],currentIndex=-1,phase='idle';
let searchTimeout=null,currentDeviceId=null;
let wakeLock=null,progressInterval=null,isPaused=false,autoAdvanceAbort=false;

// ═══ AUTH ═══
function rng(n){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';const v=crypto.getRandomValues(new Uint8Array(n));return v.reduce((a,x)=>a+c[x%c.length],'');}
async function sha256(p){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));}
function b64u(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
async function loginSpotify(){const v=rng(64);localStorage.setItem('code_verifier',v);const ch=b64u(await sha256(v));window.location=`https://accounts.spotify.com/authorize?${new URLSearchParams({response_type:'code',client_id:CLIENT_ID,scope:SCOPES,code_challenge_method:'S256',code_challenge:ch,redirect_uri:REDIRECT_URI})}`;}
async function handleCallback(){const code=new URLSearchParams(window.location.search).get('code');if(!code)return false;const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,code_verifier:localStorage.getItem('code_verifier')})});const d=await r.json();if(d.access_token){accessToken=d.access_token;localStorage.setItem('spotify_token',accessToken);localStorage.setItem('spotify_token_time',Date.now().toString());window.history.replaceState({},document.title,'/');return true;}return false;}
async function api(ep,o={}){const r=await fetch(`https://api.spotify.com/v1${ep}`,{...o,headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json',...o.headers}});if(r.status===204)return null;if(r.status===401){localStorage.removeItem('spotify_token');showScreen('home');return null;}if(!r.ok)return null;return r.json();}
async function getUser(){return api('/me');}
async function searchAPI(q){if(!q.trim())return[];const d=await api(`/search?q=${encodeURIComponent(q)}&type=track&limit=10`);return d?.tracks?.items||[];}
async function getDevices(){const d=await api('/me/player/devices');return d?.devices||[];}
async function transfer(id){await api('/me/player',{method:'PUT',body:JSON.stringify({device_ids:[id],play:false})});await sleep(500);}

// CRITICAL: playSong uses fetch directly, retries on 404, and does NOT call pause first
async function playSong(uri){
  const did=currentDeviceId;
  const url=`https://api.spotify.com/v1/me/player/play${did?`?device_id=${did}`:''}`;
  const opts={method:'PUT',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({uris:[uri]})};
  let r=await fetch(url,opts);
  if(r.status===404&&did){
    // No active device, try transfer then retry
    await transfer(did);await sleep(1000);
    r=await fetch(url,opts);
  }
  if(r.status===403||r.status===502){
    // Retry once after a short wait
    await sleep(2000);
    await fetch(url,opts);
  }
  return r;
}
async function pausePlayback(){try{await api('/me/player/pause',{method:'PUT'});}catch(e){}}
// Resume playback without restarting the song
async function resumePlayback(){
  const did=currentDeviceId;
  const url=`https://api.spotify.com/v1/me/player/play${did?`?device_id=${did}`:''}`;
  // Call play with NO body = resume from current position
  await fetch(url,{method:'PUT',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'}});
}
async function getState(){return api('/me/player');}

// ═══ SESSION ═══
function saveSession(){try{localStorage.setItem('shuffle_session',JSON.stringify({players,songsPerUser,countdownName,submissions,countdownList,revealedSongs,currentIndex,phase,ts:Date.now()}));}catch(e){}}
function loadSession(){try{const r=localStorage.getItem('shuffle_session');if(!r)return null;const s=JSON.parse(r);if(Date.now()-s.ts>86400000){clearSession();return null;}return s;}catch(e){return null;}}
function clearSession(){localStorage.removeItem('shuffle_session');}
function resumeSession(s){players=s.players;songsPerUser=s.songsPerUser;countdownName=s.countdownName;submissions=s.submissions;countdownList=s.countdownList;revealedSongs=s.revealedSongs;currentIndex=s.currentIndex!=null?s.currentIndex:(s.currentPosition!=null?countdownList.length-s.currentPosition:-1);phase=s.phase;if(['announcing','playing'].includes(phase))phase='idle';if(countdownList.length>0&&phase!=='finished'){showScreen('countdown');document.getElementById('countdown-brand').textContent=countdownName;renderIdle();requestWakeLock();}else if(phase==='finished'){showScreen('countdown');renderFinished();}else{document.getElementById('songs-per-user').value=songsPerUser;document.getElementById('countdown-name-btn').textContent=countdownName;renderLobby();showScreen('lobby');}}
async function requestWakeLock(){try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null;}}

// ═══ SCREENS ═══
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(`screen-${id}`).classList.add('active');}
function goHome(){if(phase==='playing'){pausePlayback();isPaused=true;autoAdvanceAbort=true;saveSession();}if(accessToken){renderLobby();showScreen('lobby');}else showScreen('home');}
function updateHomeButton(){const a=document.getElementById('home-action');if(accessToken&&spotifyUser)a.innerHTML=`<button class="btn-spotify" onclick="initLobby()" style="background:var(--green);"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Continue as ${spotifyUser.display_name||'You'}</button>`;}
function getInitials(n){return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}

// ═══ LOBBY ═══
function initLobby(){if(players.length===0)players=[{name:spotifyUser?.display_name||'You',color:PLAYER_COLORS[0],initials:getInitials(spotifyUser?.display_name||'You')}];document.getElementById('countdown-name-btn').textContent=countdownName;document.getElementById('songs-per-user').value=songsPerUser;renderLobby();showScreen('lobby');}
function editCountdownName(){const n=prompt('Name your countdown:',countdownName);if(n&&n.trim()){countdownName=n.trim();document.getElementById('countdown-name-btn').textContent=countdownName;}}
function updateSongsPerUser(){const v=parseInt(document.getElementById('songs-per-user').value);const mx=Math.min(10,Math.floor(MAX_TOTAL/Math.max(players.length,1)));songsPerUser=Math.min(v,mx);document.getElementById('songs-per-user').value=songsPerUser;submissions={};renderLobby();}
function addPlayer(){const input=document.getElementById('new-player-name');const name=input.value.trim();if(!name||players.length>=20)return;if(players.find(p=>p.name.toLowerCase()===name.toLowerCase()))return;players.push({name,color:PLAYER_COLORS[players.length%PLAYER_COLORS.length],initials:getInitials(name)});input.value='';const mx=Math.min(10,Math.floor(MAX_TOTAL/players.length));if(songsPerUser>mx){songsPerUser=mx;document.getElementById('songs-per-user').value=songsPerUser;}renderLobby();}
document.getElementById('new-player-name').addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer();});
function removePlayer(i){if(i===0)return;players.splice(i,1);renderLobby();}
function renderLobby(){const t=players.length*songsPerUser;document.getElementById('lobby-subtitle').textContent=`${songsPerUser} song${songsPerUser>1?'s':''} each · ${players.length} player${players.length>1?'s':''} · ${t} song countdown`;const list=document.getElementById('player-list');list.innerHTML=players.map((p,i)=>{const sub=!!submissions[p.name];return`<div class="player-card ${sub?'submitted':''}"><div class="player-avatar" style="background:${p.color};">${p.initials}</div><div class="player-info"><div class="player-name">${p.name}${i===0?' (you)':''}</div><div class="player-status ${sub?'done':''}">${sub?songsPerUser+' songs locked in':'Waiting to pick...'}</div></div>${!sub&&i>0?`<button class="remove-btn" onclick="removePlayer(${i})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`:''}</div>`;}).join('');const actions=document.getElementById('lobby-actions');const allSub=players.length>=2&&players.every(p=>submissions[p.name]);const next=players.find(p=>!submissions[p.name]);if(allSub)actions.innerHTML=`<button class="btn-start" onclick="startCountdown()">START THE COUNTDOWN</button>`;else if(next&&players.length>=2)actions.innerHTML=`<button class="btn-primary" onclick="startPicking('${next.name.replace(/'/g,"\\'")}')" style="max-width:100%;">Pick Songs as ${next.name}</button>`;else actions.innerHTML=`<p style="text-align:center;color:var(--text3);font-size:13px;padding:12px 0;">Add at least one friend to start</p>`;}

// ═══ PICKER ═══
function startPicking(name){currentPickerIndex=players.findIndex(p=>p.name===name);selectedSongs=[];document.getElementById('search-input').value='';showDefaultSongs();updatePickerUI();showScreen('pick');}
async function showDefaultSongs(){const l=document.getElementById('song-list');l.innerHTML='<div style="padding:20px 0;"><div class="spinner"></div></div>';const q=DEFAULT_QUERIES[Math.floor(Math.random()*DEFAULT_QUERIES.length)];const t=await searchAPI(q);if(t.length>0){l._tracks=t;renderSearchResults(t);}else l.innerHTML='<p style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px;">Search for songs above</p>';}
function updatePickerUI(){const p=players[currentPickerIndex];document.getElementById('pick-user').innerHTML=`<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:20px;height:20px;border-radius:50%;background:${p.color};display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;">${p.initials}</span>${p.name}'s picks</span>`;document.getElementById('pick-count-num').textContent=selectedSongs.length;document.getElementById('pick-count-total').textContent=songsPerUser;document.getElementById('lock-in-btn').style.display=selectedSongs.length===songsPerUser?'block':'none';document.getElementById('selected-strip').innerHTML=selectedSongs.map((s,i)=>`<div class="selected-chip" onclick="deselectSong(${i})"><img src="${s.album?.images?.[2]?.url||s.album?.images?.[0]?.url||''}" alt=""><span>${s.name.length>18?s.name.substring(0,18)+'...':s.name}</span><span style="opacity:0.6;margin-left:2px;">×</span></div>`).join('');const f=document.getElementById('pick-footer'),b=document.getElementById('pick-footer-btn'),rem=songsPerUser-selectedSongs.length;f.style.display='block';if(rem>0){b.disabled=true;b.textContent=`Select ${rem} more song${rem>1?'s':''}`;}else{b.disabled=false;b.textContent=`Lock In ${songsPerUser} Songs`;b.onclick=lockInSongs;}}
function debounceSearch(){clearTimeout(searchTimeout);searchTimeout=setTimeout(doSearch,350);}
async function doSearch(){const q=document.getElementById('search-input').value;if(!q.trim()){showDefaultSongs();return;}document.getElementById('song-list').innerHTML='<div style="padding:40px 0;"><div class="spinner"></div></div>';const t=await searchAPI(q);document.getElementById('song-list')._tracks=t;renderSearchResults(t);}
function renderSearchResults(tracks){const l=document.getElementById('song-list');if(!tracks.length){l.innerHTML='<p style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px;">No results found</p>';return;}l.innerHTML=tracks.map(t=>{const sel=selectedSongs.find(s=>s.id===t.id);const dis=!sel&&selectedSongs.length>=songsPerUser;const art=t.album?.images?.[1]?.url||t.album?.images?.[0]?.url||'';return`<div class="song-item ${sel?'selected':''} ${dis?'disabled':''}" onclick="toggleSong('${t.id}')"><div class="song-art">${art?`<img src="${art}">`:'<div style="width:100%;height:100%;background:var(--surface2)"></div>'}</div><div class="song-meta"><div class="song-title">${t.name}</div><div class="song-artist">${t.artists.map(a=>a.name).join(', ')}</div></div>${sel?'<div class="song-check"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>':''}</div>`;}).join('');l._tracks=tracks;}
function toggleSong(id){const tracks=document.getElementById('song-list')._tracks||[];const t=tracks.find(x=>x.id===id);if(!t)return;const idx=selectedSongs.findIndex(s=>s.id===id);if(idx>=0)selectedSongs.splice(idx,1);else if(selectedSongs.length<songsPerUser)selectedSongs.push(t);updatePickerUI();renderSearchResults(tracks);}
function deselectSong(i){selectedSongs.splice(i,1);updatePickerUI();const l=document.getElementById('song-list');if(l._tracks)renderSearchResults(l._tracks);}
function lockInSongs(){if(selectedSongs.length!==songsPerUser)return;const p=players[currentPickerIndex];submissions[p.name]=selectedSongs.map(s=>({...s,submittedBy:p.name,submittedByColor:p.color,submittedByInitials:p.initials}));selectedSongs=[];renderLobby();showScreen('lobby');}

// ═══ COUNTDOWN ═══
// countdownList is ordered [position N, N-1, ..., 2, 1]
// currentIndex starts at 0 and increments. Song at currentIndex is the current song.
// The "position number" displayed = countdownList.length - currentIndex
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getCurrentPosition(){return countdownList.length-currentIndex;}

async function startCountdown(){const all=Object.values(submissions).flat();countdownList=shuffleArray(all);currentIndex=-1;revealedSongs=[];phase='idle';autoAdvanceAbort=false;isPaused=false;const devices=await getDevices();if(devices.length===0){showScreen('countdown');document.getElementById('countdown-brand').textContent=countdownName;showNoDeviceScreen();return;}if(devices.length===1){currentDeviceId=devices[0].id;await transfer(currentDeviceId);}else{showScreen('countdown');document.getElementById('countdown-brand').textContent=countdownName;showDevicePicker(devices);return;}showScreen('countdown');document.getElementById('countdown-brand').textContent=countdownName;await requestWakeLock();saveSession();await playCinematicIntro();}

function showNoDeviceScreen(){document.getElementById('countdown-content').innerHTML=`<div style="text-align:center;max-width:320px;animation:fadeUp 0.5s ease-out;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.5" style="margin-bottom:16px;"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg><h3 style="font-size:18px;margin-bottom:12px;">Open Spotify and play a song</h3><p style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:8px;">Open the Spotify app, <strong>play any song and keep it playing</strong> — don't pause it — then come back here.</p><p style="font-size:13px;color:var(--text3);line-height:1.5;margin-bottom:28px;">The song needs to be actively playing, not paused. We'll take over from here.</p><button class="btn-primary" onclick="retryDevices()" style="max-width:100%;">It's playing — try again</button><button class="btn-secondary" onclick="showScreen('lobby')" style="max-width:100%;margin-top:8px;">Back to lobby</button></div>`;}
function showDevicePicker(devices){document.getElementById('countdown-content').innerHTML=`<div style="text-align:center;max-width:320px;width:100%;animation:fadeUp 0.5s ease-out;"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.5" style="margin-bottom:12px;"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg><h3 style="font-size:18px;margin-bottom:4px;">Where should we play?</h3><p style="font-size:13px;color:var(--text3);margin-bottom:24px;">Pick which device plays the music</p><div style="display:flex;flex-direction:column;gap:8px;">${devices.map(d=>`<button onclick="selectDevice('${d.id}')" style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:15px;cursor:pointer;text-align:left;width:100%;"><div><div style="font-weight:600;">${d.name}</div><div style="font-size:12px;color:var(--text3);">${d.type}${d.is_active?' · Active':''}</div></div></button>`).join('')}</div></div>`;}
async function retryDevices(){const d=await getDevices();if(d.length===0){alert("Still no devices found. Make sure a song is actively playing in Spotify (not paused).");return;}currentDeviceId=d[0].id;await transfer(currentDeviceId);await requestWakeLock();saveSession();await playCinematicIntro();}
async function selectDevice(id){currentDeviceId=id;await transfer(id);await requestWakeLock();saveSession();await playCinematicIntro();}

async function playCinematicIntro(){const c=document.getElementById('countdown-content');const names=players.map(p=>p.name).join(' · ');const t=countdownList.length;c.innerHTML=`<div class="intro-screen"><div class="intro-text" style="margin-bottom:8px;">${countdownName.toUpperCase()}</div><div class="intro-names">${names}</div><div style="font-size:14px;color:var(--text2);margin-bottom:40px;">${t} songs. Only one can be #1.<br>None of them deserve it.</div><div class="intro-text">YOUR COUNTDOWN BEGINS IN...</div></div>`;await sleep(2500);for(let i=5;i>=1;i--){c.innerHTML=`<div class="intro-screen"><div class="intro-big-number">${i}</div></div>`;await sleep(800);}c.innerHTML=`<div class="intro-screen"><div class="announce-number" style="font-size:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">LET'S GO</div></div>`;await sleep(1000);playNextSong();}

// ═══ CORE PLAYBACK — SIMPLE: just play songs one after another ═══
async function playNextSong(){
  currentIndex++;
  // Check if countdown is done
  if(currentIndex>=countdownList.length){
    phase='finished';
    stopProgressPolling();
    renderFinished();
    saveSession();
    releaseWakeLock();
    return;
  }
  const song=countdownList[currentIndex];
  const pos=getCurrentPosition();
  revealedSongs.push(song);
  phase='playing';
  isPaused=false;
  autoAdvanceAbort=false;
  renderPlaying();
  saveSession();
  // Actually play the song on Spotify
  await playSong(song.uri);
  // Start polling for song end
  startProgressPolling();
  waitForSongEnd().then(()=>{
    if(!autoAdvanceAbort)playNextSong();
  });
}

function renderPlaying(){
  const song=countdownList[currentIndex];
  const pos=getCurrentPosition();
  const art=song.album?.images?.[0]?.url||'';
  const c=document.getElementById('countdown-content');
  c.innerHTML=`<div class="now-playing">
    <div class="np-position">#${pos}</div>
    <div class="np-art">${art?`<img src="${art}">`:'<div style="width:100%;height:100%;background:var(--surface2);display:flex;align-items:center;justify-content:center;"><svg width="48" height="48" viewBox="0 0 24 24" fill="var(--text3)"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg></div>'}</div>
    <div class="np-title">${song.name}</div>
    <div class="np-artist">${song.artists.map(a=>a.name).join(', ')}</div>
    <div class="np-submitter"><span class="avatar-sm" style="background:${song.submittedByColor};">${song.submittedByInitials}</span><span>${song.submittedBy}'s pick</span></div>
    <div class="playback-controls">
      <button class="ctrl-btn" onclick="doPrev()"><svg viewBox="0 0 24 24"><use href="#icon-skip-prev"/></svg></button>
      <button class="ctrl-btn play" id="play-pause-btn" onclick="doPlayPause()"><svg viewBox="0 0 24 24"><use href="#icon-pause"/></svg></button>
      <button class="ctrl-btn" onclick="doNext()"><svg viewBox="0 0 24 24"><use href="#icon-skip-next"/></svg></button>
    </div>
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div><div class="progress-times"><span id="progress-elapsed">0:00</span><span id="progress-total">0:00</span></div></div>
  </div>`;
  renderTicker();
}

// Transport controls
async function doPlayPause(){
  if(isPaused){
    await resumePlayback();
    isPaused=false;
  }else{
    await pausePlayback();
    isPaused=true;
  }
  const b=document.getElementById('play-pause-btn');
  if(b)b.innerHTML=isPaused?'<svg viewBox="0 0 24 24"><use href="#icon-play"/></svg>':'<svg viewBox="0 0 24 24"><use href="#icon-pause"/></svg>';
}

async function doNext(){
  autoAdvanceAbort=true;
  stopProgressPolling();
  await sleep(100);
  autoAdvanceAbort=false;
  playNextSong();
}

async function doPrev(){
  // Replay current song from beginning
  const song=countdownList[currentIndex];
  if(song){await playSong(song.uri);isPaused=false;const b=document.getElementById('play-pause-btn');if(b)b.innerHTML='<svg viewBox="0 0 24 24"><use href="#icon-pause"/></svg>';}
}

// Progress polling
function startProgressPolling(){stopProgressPolling();progressInterval=setInterval(async()=>{if(phase!=='playing'||isPaused)return;const s=await getState();if(s&&s.item){const pct=(s.progress_ms/s.item.duration_ms)*100;const f=document.getElementById('progress-fill'),te=document.getElementById('progress-elapsed'),tt=document.getElementById('progress-total');if(f)f.style.width=pct+'%';if(te)te.textContent=fmt(s.progress_ms);if(tt)tt.textContent=fmt(s.item.duration_ms);}},2500);}
function stopProgressPolling(){if(progressInterval){clearInterval(progressInterval);progressInterval=null;}}
function fmt(ms){const s=Math.floor(ms/1000);return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;}

async function waitForSongEnd(){return new Promise(resolve=>{const check=async()=>{if(autoAdvanceAbort){resolve();return;}if(isPaused){setTimeout(check,2000);return;}const s=await getState();if(!s||!s.is_playing){await sleep(1500);resolve();return;}if(s.item&&s.progress_ms>=s.item.duration_ms-2000){await sleep(2500);resolve();return;}setTimeout(check,3000);};setTimeout(check,5000);});}

// ═══ IDLE/RESUME SCREEN ═══
function renderIdle(){
  const c=document.getElementById('countdown-content');
  const r=revealedSongs.length,t=countdownList.length;
  let histHTML='';
  if(revealedSongs.length>0){
    histHTML=`<div class="resume-history"><div class="resume-history-header">PREVIOUSLY REVEALED</div>${[...revealedSongs].reverse().map((s,i)=>{const pos=t-(revealedSongs.length-1-i);const art=s.album?.images?.[2]?.url||s.album?.images?.[0]?.url||'';return`<div class="rh-item"><span class="rh-pos">#${pos}</span><div class="rh-art">${art?`<img src="${art}">`:''}</div><div class="rh-meta"><div class="rh-title">${s.name}</div><div class="rh-artist">${s.artists.map(a=>a.name).join(', ')}</div></div><span class="avatar-sm" style="background:${s.submittedByColor};font-size:8px;">${s.submittedByInitials}</span></div>`;}).join('')}</div>`;
  }
  c.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <button class="big-play" onclick="resumeCountdown()"><svg viewBox="0 0 24 24"><use href="#icon-play"/></svg></button>
    <div class="reveal-hint" style="margin-bottom:24px;">TAP TO ${r>0?'RESUME':'START'}</div>
    <div class="countdown-progress"><div class="track"><div class="fill" style="width:${(r/t)*100}%"></div></div><div class="label">${r} of ${t} revealed</div></div>
    ${histHTML}
    <button class="btn-secondary" onclick="confirmNewCountdown()" style="margin-top:20px;max-width:280px;font-size:13px;">Start New Countdown</button>
  </div>`;
  document.getElementById('revealed-ticker').innerHTML='';
}

async function resumeCountdown(){
  autoAdvanceAbort=false;
  isPaused=false;
  await requestWakeLock();
  // If we haven't started yet, do the intro
  if(currentIndex<0){await playCinematicIntro();return;}
  // Otherwise resume from next song
  playNextSong();
}

function confirmNewCountdown(){if(confirm('Start a new countdown? Your current one will be lost.'))resetAll();}

// ═══ TICKER ═══
function renderTicker(){const tk=document.getElementById('revealed-ticker');if(revealedSongs.length===0||phase==='finished'||phase==='idle'){tk.innerHTML='';return;}tk.innerHTML=[...revealedSongs].reverse().slice(0,6).map((s,i)=>{const pos=countdownList.length-(revealedSongs.length-1-i);return`<div class="ticker-chip" style="opacity:${1-i*0.12}"><span class="pos">#${pos}</span><span class="name">${s.name}</span></div>`;}).join('');}

// ═══ FINISHED ═══
function renderFinished(){const c=document.getElementById('countdown-content');const w=countdownList[countdownList.length-1];// Last item is #1
c.innerHTML=`<div class="finished-wrap"><div style="margin-bottom:12px;"><svg width="48" height="48" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z"/></svg></div><div class="finished-label">NUMBER ONE</div><div class="finished-title">${w.name}</div><div class="finished-artist">${w.artists.map(a=>a.name).join(', ')}</div><div class="finished-winner"><span class="avatar-sm" style="background:${w.submittedByColor};">${w.submittedByInitials}</span>${w.submittedBy} takes #1!</div><div class="finished-list"><div class="finished-list-header">FULL COUNTDOWN</div>${countdownList.map((s,i)=>{const pos=countdownList.length-i;return`<div class="finished-item ${i===countdownList.length-1?'winner':''}"><span class="finished-pos ${i===countdownList.length-1?'gold':''}">#${pos}</span><div class="finished-song"><div class="finished-song-t">${s.name}</div><div class="finished-song-a">${s.artists.map(a=>a.name).join(', ')}</div></div><span class="avatar-sm" style="background:${s.submittedByColor};font-size:8px;">${s.submittedByInitials}</span></div>`;}).join('')}</div><button class="btn-secondary" onclick="resetAll()" style="margin-top:20px;max-width:100%;">New Countdown</button></div>`;document.getElementById('revealed-ticker').innerHTML='';}

// ═══ HISTORY ═══
function toggleHistory(){const p=document.getElementById('history-panel'),o=document.getElementById('history-overlay');if(p.classList.contains('open')){p.classList.remove('open');o.classList.remove('open');}else{renderHistory();p.classList.add('open');o.classList.add('open');}}
function renderHistory(){const l=document.getElementById('history-list');if(revealedSongs.length===0){l.innerHTML='<p style="text-align:center;color:var(--text3);padding:40px 0;">No songs revealed yet</p>';return;}l.innerHTML=[...revealedSongs].map((s,i)=>{const pos=countdownList.length-i;const art=s.album?.images?.[2]?.url||s.album?.images?.[0]?.url||'';return`<div class="history-item"><span class="history-pos">#${pos}</span><div class="history-art">${art?`<img src="${art}">`:''}</div><div class="history-meta"><div class="history-song-title">${s.name}</div><div class="history-song-artist">${s.artists.map(a=>a.name).join(', ')}</div></div><span style="display:flex;align-items:center;"><span class="avatar-sm" style="background:${s.submittedByColor};font-size:8px;">${s.submittedByInitials}</span></span></div>`;}).join('');}

// ═══ UTILS ═══
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function resetAll(){players=players.length>0?[players[0]]:[];submissions={};countdownList=[];revealedSongs=[];currentIndex=-1;phase='idle';isPaused=false;autoAdvanceAbort=false;clearSession();stopProgressPolling();releaseWakeLock();countdownName='Road Trip Shuffle';document.getElementById('countdown-name-btn').textContent=countdownName;document.getElementById('songs-per-user').value=5;songsPerUser=5;renderLobby();showScreen('lobby');}
document.addEventListener('visibilitychange',()=>{if(document.hidden&&phase==='playing'){pausePlayback();isPaused=true;autoAdvanceAbort=true;saveSession();}});
window.addEventListener('beforeunload',()=>{if(countdownList.length>0)saveSession();});

// ═══ INIT ═══
async function init(){if(window.location.search.includes('code=')){const ok=await handleCallback();if(ok){spotifyUser=await getUser();if(spotifyUser){const s=loadSession();if(s){resumeSession(s);return;}initLobby();return;}}}const saved=localStorage.getItem('spotify_token');const time=parseInt(localStorage.getItem('spotify_token_time')||'0');if(saved&&(Date.now()-time)<3500000){accessToken=saved;spotifyUser=await getUser();if(spotifyUser){updateHomeButton();const s=loadSession();if(s){resumeSession(s);return;}initLobby();return;}}showScreen('home');}
init();
</script>
